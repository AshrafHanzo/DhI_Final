# Nginx Configuration for ATS on Subpath
# File: Add to existing /etc/nginx/sites-available/dhicreativeservices.com

# Add this location block to your EXISTING server block for dhicreativeservices.com

    # ATS Application - Subpath
    location /ats {
        alias /var/www/ats-frontend/dist;
        try_files $uri $uri/ /ats/index.html;
        
        # Handle SPA routing
        location ~ ^/ats/(.*)$ {
            alias /var/www/ats-frontend/dist;
            try_files /$1 /index.html;
        }
    }

    # ATS API - Backend
    location /ats/api/ {
        # Rewrite to remove /ats prefix before proxying
        rewrite ^/ats/api/(.*)$ /api/$1 break;
        
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ATS Uploads
    location /ats/uploads/ {
        rewrite ^/ats/uploads/(.*)$ /uploads/$1 break;
        
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

# NOTE: If using subpath, you need to:
# 1. Update vite.config.ts to set base: '/ats/'
# 2. Update frontend .env: VITE_API_URL=https://dhicreativeservices.com/ats
# 3. Update React Router basename to '/ats'
