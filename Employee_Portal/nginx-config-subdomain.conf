# Nginx Configuration for ATS on Subdomain
# File: /etc/nginx/sites-available/ats.dhicreativeservices.com

server {
    listen 80;
    server_name ats.dhicreativeservices.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ats.dhicreativeservices.com;

    # SSL Certificate (use same certificate as main domain or create new one)
    ssl_certificate /etc/letsencrypt/live/dhicreativeservices.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dhicreativeservices.com/privkey.pem;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/ats-access.log;
    error_log /var/log/nginx/ats-error.log;

    # Max upload size for resume files
    client_max_body_size 10M;

    # Serve React Frontend (Static Files)
    root /var/www/ats-frontend/dist;
    index index.html;

    # Frontend Routes - React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API - Proxy to FastAPI (Docker on port 8000)
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Resume uploads
    location /uploads/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
